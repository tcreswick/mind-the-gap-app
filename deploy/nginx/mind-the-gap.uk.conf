# Redirect HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name mind-the-gap.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name mind-the-gap.uk;

    ssl_certificate /etc/letsencrypt/live/mind-the-gap.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mind-the-gap.uk/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Keep pubkey served as a static plaintext file.
    root /var/www/mind-the-gap.uk/html;

    location = /pubkey {
        default_type text/plain;
        try_files /pubkey =404;
    }

    # Reverse proxy all app traffic to local Spring Boot.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Support upgraded connections when needed.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    client_max_body_size 50m;
}
