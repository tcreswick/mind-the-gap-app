server:
  forward-headers-strategy: framework

spring:
  application:
    name: uk-companies-gender-diversity-stats
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  download-page-url: https://gender-pay-gap.service.gov.uk/viewing/download-data/
  site-base-url: ${APP_SITE_BASE_URL:https://mind-the-gap.uk/}
  source-start-year: 2017
  refresh-interval-ms: 3600000
  data-directory: data
  snapshot-file-name: store.json.gz
  page-views-file-name: company-page-views.json.gz
  page-views-persist-interval-ms: 300000
  startup-refresh-enabled: true
